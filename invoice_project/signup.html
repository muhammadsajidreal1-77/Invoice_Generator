<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Invoice Generator</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo">
            <h1>Invoice Generator</h1>
            <p>Professional Billing System</p>
        </div>

        <h2>Create Your Account</h2>



        
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="businessName" placeholder="e.g. Ali Mobiles" required>
            </div>
            <div class="form-group">
                <label>Business Address</label>
                <input type="text" id="businessAddress" placeholder="e.g. Main Bazar, Lahore" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="e.g. ali@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login Here</a>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>
